apiVersion: batch/v1
kind: Job
metadata:
  name: event-store-db-migration
  namespace: event-sourcing-demo
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: flyway
          image: flyway/flyway:11
          args:
            - migrate
          env:
            - name: FLYWAY_URL
              value: jdbc:postgresql://external-event-postgres:5432/task_events
            - name: FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: task-db-secret
                  key: username
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: task-db-secret
                  key: password
            - name: FLYWAY_LOCATIONS
              value: filesystem:/flyway/sql
            - name: FLYWAY_CONNECT_RETRIES
              value: "30"
          volumeMounts:
            - name: migrations
              mountPath: /flyway/sql
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: event-store-flyway-migrations
