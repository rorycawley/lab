apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: demo-selfsigned-bootstrap
  labels:
    app.kubernetes.io/part-of: vault-postgres-security-demo
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: demo-root-ca
  namespace: cert-manager
  labels:
    app.kubernetes.io/part-of: vault-postgres-security-demo
spec:
  isCA: true
  commonName: vault-postgres-security-demo-root-ca
  secretName: demo-root-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: demo-selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: demo-ca
  labels:
    app.kubernetes.io/part-of: vault-postgres-security-demo
spec:
  ca:
    secretName: demo-root-ca
