apiVersion: v1
kind: Pod
metadata:
  name: vault-injector-smoke
  namespace: demo
  labels:
    app.kubernetes.io/name: vault-injector-smoke
    app.kubernetes.io/part-of: vault-postgres-security-demo
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "demo-app"
    vault.hashicorp.com/service: "https://vault.vault.svc.cluster.local:8200"
    vault.hashicorp.com/tls-secret: "vault-ca"
    vault.hashicorp.com/ca-cert: "/vault/tls/ca.crt"
    vault.hashicorp.com/tls-server-name: "vault.vault.svc.cluster.local"
    vault.hashicorp.com/agent-inject-secret-db-creds: "database/creds/demo-app-runtime"
    vault.hashicorp.com/agent-inject-template-db-creds: |
      {{- with secret "database/creds/demo-app-runtime" -}}
      DB_USERNAME={{ .Data.username }}
      DB_PASSWORD={{ .Data.password }}
      {{- end }}
    vault.hashicorp.com/agent-inject-perms-db-creds: "0400"
    vault.hashicorp.com/agent-set-security-context: "true"
    vault.hashicorp.com/agent-run-as-same-user: "true"
spec:
  serviceAccountName: demo-app
  automountServiceAccountToken: true
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: hashicorp/vault:1.17.6
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -ec
        - sleep 3600
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 1000
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 200m
          memory: 64Mi
