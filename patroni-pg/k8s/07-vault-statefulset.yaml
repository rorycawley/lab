apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/part-of: vault-postgres-security-demo
spec:
  serviceName: vault
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vault
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault
        app.kubernetes.io/part-of: vault-postgres-security-demo
    spec:
      serviceAccountName: vault-auth
      containers:
        - name: vault
          image: hashicorp/vault:1.17
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              exec vault server \
                -dev \
                -dev-listen-address=0.0.0.0:8200 \
                -dev-root-token-id="$VAULT_DEV_ROOT_TOKEN_ID"
          env:
            - name: VAULT_ADDR
              value: http://127.0.0.1:8200
            - name: VAULT_DEV_ROOT_TOKEN_ID
              valueFrom:
                secretKeyRef:
                  name: vault-dev-root-token
                  key: token
            - name: VAULT_DISABLE_MLOCK
              value: "true"
          ports:
            - name: http
              containerPort: 8200
          readinessProbe:
            exec:
              command:
                - vault
                - status
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
