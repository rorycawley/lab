apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: database
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: vault-postgres-security-demo
data:
  01-security-model.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    psql -v ON_ERROR_STOP=1 \
      -v phase2_app_password="$phase2_app_password" \
      -v phase2_migration_password="$phase2_migration_password" <<'SQL'
    CREATE ROLE schema_owner NOLOGIN;
    CREATE ROLE migration_runtime NOLOGIN;
    CREATE ROLE app_runtime NOLOGIN;

    CREATE DATABASE demo_registry OWNER schema_owner;

    \connect demo_registry

    REVOKE CREATE ON SCHEMA public FROM PUBLIC;
    REVOKE ALL ON DATABASE demo_registry FROM PUBLIC;

    GRANT CONNECT ON DATABASE demo_registry TO app_runtime;
    GRANT CONNECT ON DATABASE demo_registry TO migration_runtime;

    CREATE SCHEMA registry AUTHORIZATION schema_owner;

    CREATE TABLE registry.company (
      id uuid PRIMARY KEY,
      name text NOT NULL,
      status text NOT NULL,
      created_at timestamptz NOT NULL DEFAULT now()
    );

    ALTER TABLE registry.company OWNER TO schema_owner;

    GRANT USAGE ON SCHEMA registry TO app_runtime;
    GRANT SELECT, INSERT, UPDATE, DELETE ON registry.company TO app_runtime;

    GRANT USAGE, CREATE ON SCHEMA registry TO migration_runtime;

    CREATE ROLE phase2_app_user
      WITH LOGIN PASSWORD :'phase2_app_password'
      IN ROLE app_runtime;

    CREATE ROLE phase2_migration_user
      WITH LOGIN PASSWORD :'phase2_migration_password'
      IN ROLE migration_runtime;

    COMMENT ON ROLE schema_owner IS 'Owns registry schema and tables; not used by the app.';
    COMMENT ON ROLE migration_runtime IS 'Base role for short-lived migration credentials.';
    COMMENT ON ROLE app_runtime IS 'Base role for short-lived runtime app credentials; CRUD only.';
    COMMENT ON ROLE phase2_app_user IS 'Temporary Phase 2 test login. Replaced by Vault-generated users later.';
    COMMENT ON ROLE phase2_migration_user IS 'Temporary Phase 2 migration test login. Replaced by Vault-generated users later.';
    SQL
