services:
  postgres:
    image: postgres:16
    container_name: patroni-pg-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      phase2_app_password: ${PHASE2_APP_PASSWORD}
      phase2_migration_password: ${PHASE2_MIGRATION_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
      - ./postgres-config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./.runtime/tls/postgres:/tls/postgres:ro
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/tls/postgres/tls.crt
      - -c
      - ssl_key_file=/tls/postgres/tls.key
      - -c
      - ssl_ca_file=/tls/postgres/ca.crt
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
      - -c
      - log_statement=ddl
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_line_prefix=%m [%p] [%a] [%u@%d]
      - -c
      - log_min_messages=warning
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID

volumes:
  postgres-data:
