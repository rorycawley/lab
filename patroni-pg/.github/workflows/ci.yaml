name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck

      - name: Shellcheck on scripts
        run: |
          fail=0
          for f in scripts/*.sh; do
            shellcheck -S warning "$f" || fail=1
          done
          exit $fail

      - name: Install yamllint
        run: pip install yamllint

      - name: Yamllint on Kubernetes manifests
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable, indentation: {spaces: 2, indent-sequences: consistent}, comments: disable, comments-indentation: disable, truthy: disable}}" k8s/

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform -chdir=terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: kubectl client-side dry-run on manifests
        run: kubectl apply --dry-run=client -f k8s/
