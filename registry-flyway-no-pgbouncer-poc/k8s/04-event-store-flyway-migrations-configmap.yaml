apiVersion: v1
kind: ConfigMap
metadata:
  name: event-store-flyway-migrations
  namespace: registry-poc
data:
  V001__create_event_store.sql: |
    CREATE TABLE IF NOT EXISTS domain_events (
        sequence BIGSERIAL PRIMARY KEY,
        event_id UUID NOT NULL UNIQUE,
        stream_id TEXT NOT NULL,
        event_type TEXT NOT NULL,
        event_data JSONB NOT NULL,
        occurred_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE INDEX IF NOT EXISTS idx_domain_events_stream_id
    ON domain_events (stream_id);

    CREATE INDEX IF NOT EXISTS idx_domain_events_event_type
    ON domain_events (event_type);

    INSERT INTO domain_events (
        event_id,
        stream_id,
        event_type,
        event_data,
        occurred_at
    )
    VALUES (
        '11111111-1111-1111-1111-111111111111',
        'company-123456',
        'CompanyRegistered',
        '{"company_number":"123456","company_name":"Example Company Ltd"}'::jsonb,
        now()
    )
    ON CONFLICT (event_id) DO NOTHING;

  V002__add_correlation_columns.sql: |
    ALTER TABLE domain_events
    ADD COLUMN IF NOT EXISTS correlation_id UUID;

    ALTER TABLE domain_events
    ADD COLUMN IF NOT EXISTS causation_id UUID;

    UPDATE domain_events
    SET correlation_id = event_id
    WHERE correlation_id IS NULL;
