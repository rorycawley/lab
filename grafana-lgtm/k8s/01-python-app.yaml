apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-demo-app
  namespace: grafana-lgtm-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-demo-app
  template:
    metadata:
      labels:
        app: otel-demo-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: otel-demo-app:demo
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OTEL_SERVICE_NAME
              value: otel-demo-app
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.grafana-lgtm-demo.svc:4318
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=grafana-lgtm-demo,deployment.environment=rancher-desktop,k8s.deployment.name=otel-demo-app
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: K8S_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: K8S_DEPLOYMENT_NAME
              value: otel-demo-app
            - name: K8S_CONTAINER_NAME
              value: api
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: otel-demo-app
  namespace: grafana-lgtm-demo
spec:
  type: ClusterIP
  selector:
    app: otel-demo-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: otel-demo-app
  namespace: grafana-lgtm-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: otel-demo-app
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: otel-demo-app
  namespace: grafana-lgtm-demo
spec:
  ingressClassName: traefik
  rules:
    - host: app.grafana-lgtm.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: otel-demo-app
                port:
                  number: 8080
