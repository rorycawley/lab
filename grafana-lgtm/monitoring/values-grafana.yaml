replicas: 1

adminUser: admin
adminPassword: admin

grafana.ini:
  smtp:
    enabled: true
    host: mailhog.grafana-lgtm-demo.svc.cluster.local:1025
    from_address: grafana@mailhog.local
    from_name: Grafana
    skip_verify: true

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki-gateway.grafana-lgtm-demo.svc.cluster.local
        isDefault: true
        jsonData:
          manageAlerts: false
          derivedFields:
            - name: TraceID
              matcherRegex: "trace_id=(\\w+)"
              url: "${__value.raw}"
              datasourceUid: tempo
              urlDisplayLabel: "View trace"
      - name: Mimir
        type: prometheus
        uid: mimir
        access: proxy
        url: http://mimir-nginx.grafana-lgtm-demo.svc/prometheus
        jsonData:
          manageAlerts: false
          exemplarTraceIdDestinations:
            - name: trace_id
              datasourceUid: tempo
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.grafana-lgtm-demo.svc.cluster.local:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: -5m
            spanEndTimeShift: 5m
            tags:
              - key: service.name
                value: app
              - key: k8s.pod.name
                value: pod
              - key: k8s.namespace.name
                value: namespace
            filterByTraceID: true
            filterBySpanID: false
          serviceMap:
            datasourceUid: mimir
          nodeGraph:
            enabled: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: demo
        orgId: 1
        folder: Demo
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/demo

