alerting:
  contactpoints.yaml:
    secret:
      apiVersion: 1
      contactPoints:
        - orgId: 1
          name: mailhog-email
          receivers:
            - uid: mailhog-email
              type: email
              settings:
                addresses: alerts@mailhog.local
                singleEmail: true
  policies.yaml:
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: mailhog-email
        group_by:
          - grafana_folder
          - alertname
  rules.yaml:
    apiVersion: 1
    groups:
      - orgId: 1
        name: python-app-alerts
        folder: Demo Alerts
        interval: 30s
        rules:
          - uid: python-app-down
            title: AppDown
            condition: C
            data:
              - refId: A
                datasourceUid: mimir
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: mimir
                  editorMode: code
                  expr: count(up{namespace="grafana-lgtm-demo",app="otel-demo-app"} == 1)
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 1
                        type: lt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            dashboardUid: python-app-observability
            panelId: 7
            noDataState: Alerting
            execErrState: Error
            for: 1m
            annotations:
              description: No healthy otel-demo-app scrape target is visible in Mimir.
              summary: Python demo app is down or not being scraped.
            labels:
              severity: critical
              demo: grafana-lgtm
          - uid: python-app-high-error-rate
            title: HighErrorRate
            condition: C
            data:
              - refId: A
                datasourceUid: mimir
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: mimir
                  editorMode: code
                  expr: sum(rate(demo_errors_total[5m]))
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            dashboardUid: python-app-observability
            panelId: 2
            noDataState: OK
            execErrState: Error
            for: 1m
            annotations:
              description: The app has returned errors during the last 5 minutes.
              summary: Python demo app error rate is above zero.
            labels:
              severity: warning
              demo: grafana-lgtm
          - uid: python-app-high-latency-p95
            title: HighLatencyP95
            condition: C
            data:
              - refId: A
                datasourceUid: mimir
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  datasource:
                    type: prometheus
                    uid: mimir
                  editorMode: code
                  expr: histogram_quantile(0.95, sum by (le) (rate(demo_request_duration_ms_bucket[5m])))
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
                  range: false
                  refId: A
              - refId: B
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 200
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            dashboardUid: python-app-observability
            panelId: 3
            noDataState: OK
            execErrState: Error
            for: 1m
            annotations:
              description: p95 request latency is above 200 ms over the last 5 minutes.
              summary: Python demo app p95 latency is high.
            labels:
              severity: warning
              demo: grafana-lgtm

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - grafana.grafana-lgtm.localhost

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi
