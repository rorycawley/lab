deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: loki
      ruler: loki
      admin: loki
    s3:
      endpoint: alarik-minio.grafana-lgtm-demo.svc.cluster.local:9000
      accessKeyId: admin
      secretAccessKey: alarik123
      s3ForcePathStyle: true
      insecure: true
  limits_config:
    allow_structured_metadata: true

singleBinary:
  replicas: 1

minio:
  enabled: false

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

chunksCache:
  enabled: false
resultsCache:
  enabled: false
