name: CD — Deploy to Hetzner

on:
  # Runs after CI completes on main
  workflow_run:
    workflows: ["CI — Build & Push"]
    types: [completed]
    branches: [main]

  # Or trigger manually from GitHub UI
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if CI succeeded (or if triggered manually)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        run: |
          helm upgrade --install myapp ./helm/myapp \
            -f ./helm/myapp/values-prod.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set ingress.host=${{ vars.PROD_HOST }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/myapp --timeout=180s

      - name: Smoke test
        run: |
          APP_HOST=$(kubectl get ingress myapp -o jsonpath='{.spec.rules[0].host}')
          LB_IP=$(kubectl get ingress myapp -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

          echo "Testing https://${APP_HOST}/health (via ${LB_IP})"

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
              --resolve "${APP_HOST}:443:${LB_IP}" \
              --max-time 10 \
              "https://${APP_HOST}/health" 2>/dev/null) || true

            if [ "$STATUS" = "200" ]; then
              echo "✓ Health check passed (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}: got HTTP ${STATUS:-timeout}, retrying in 5s..."
            sleep 5
          done

          echo "✗ Health check failed after 5 attempts"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Rolling back to previous release..."
          helm rollback myapp
          echo "✗ Deploy failed — rolled back."
