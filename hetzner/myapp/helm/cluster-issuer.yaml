# ClusterIssuer for cert-manager + Let's Encrypt
# Apply once per cluster: bb cluster-issuer
#
# The ingress class must match your ingress controller:
#   k3s (Hetzner):  traefik
#   EKS (AWS):      nginx or alb
#   AKS (Azure):    nginx
#   GKE (GCP):      nginx or gce
#
# Set via INGRESS_CLASS env var, defaults to traefik.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${ACME_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - http01:
          ingress:
            class: ${INGRESS_CLASS}
