# Tempo — distributed tracing (the T in LGTM)
# Uses local filesystem for storage (simple, no external deps).
# ⚠️ Pinned to chart version 1.10.3 (newer versions are deprecated)

tempo:
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  metricsGenerator:
    enabled: false

  retention: 168h                   # 7 days

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi
