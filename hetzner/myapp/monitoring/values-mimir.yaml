# Mimir — long-term metrics storage (the M in LGTM)
# Monolithic mode: replaces Prometheus for storage.
# Alloy scrapes metrics and remote-writes to Mimir.

deploymentMode: monolithic

# MinIO credentials are injected as env vars from the minio-root-creds
# Sealed Secret (created by monitoring/seal-secrets.sh) and substituted
# into the config below via Mimir's `-config.expand-env=true` flag.
global:
  extraEnvFrom:
    - secretRef:
        name: minio-root-creds

mimir:
  structuredConfig:
    common:
      storage:
        backend: s3
        s3:
          endpoint: minio-mimir.monitoring.svc:9000
          bucket_name: mimir-data
          access_key_id: ${rootUser}
          secret_access_key: ${rootPassword}
          insecure: true

    blocks_storage:
      storage_prefix: blocks
      tsdb:
        dir: /data/tsdb

    limits:
      native_histograms_ingestion_enabled: true

multitenancy_enabled: false

minio:
  enabled: false

monolithic:
  replicas: 1
  # -config.expand-env=true makes Mimir substitute ${VAR} references in
  # the structured config from the env vars injected by global.extraEnvFrom.
  extraArgs:
    config.expand-env: "true"
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1536Mi
  persistentVolume:
    enabled: true
    size: 10Gi

# Disable distributed components
ingester:
  replicas: 0
distributor:
  replicas: 0
querier:
  replicas: 0
query_frontend:
  replicas: 0
store_gateway:
  replicas: 0
compactor:
  replicas: 0

gateway:
  enabledNonEnterprise: false

metaMonitoring:
  dashboards:
    enabled: false
  serviceMonitor:
    enabled: false
  prometheusRule:
    enabled: false
