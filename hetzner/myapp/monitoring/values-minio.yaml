# MinIO — S3-compatible object storage for Mimir
# Loki has its own built-in MinIO. Tempo uses local filesystem.
# This instance is only used by Mimir for metrics storage.

mode: standalone
replicas: 1

persistence:
  enabled: true
  size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# Root credentials — change these for production!
rootUser: minio
rootPassword: minio-secret-key-change-me

buckets:
  - name: mimir-data
    policy: none

console:
  enabled: false
