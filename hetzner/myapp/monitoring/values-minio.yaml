# MinIO — S3-compatible object storage for Mimir
# Loki has its own built-in MinIO. Tempo uses local filesystem.
# This instance is only used by Mimir for metrics storage.

mode: standalone
replicas: 1

persistence:
  enabled: true
  size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# Root credentials — sourced from the Sealed Secret created by
# monitoring/seal-secrets.sh. The secret must contain rootUser and
# rootPassword keys.
existingSecret: minio-root-creds

buckets:
  - name: mimir-data
    policy: none

console:
  enabled: false
