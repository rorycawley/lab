# Loki — log aggregation (the L in LGTM)
# SingleBinary mode with built-in MinIO.
# ⚠️ Pinned to chart version 6.33.0 (newer versions have breaking changes)

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  useTestSchema: true

  commonConfig:
    replication_factor: 1

  storage:
    type: s3
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin

  limits_config:
    retention_period: 168h          # 7 days
    allow_structured_metadata: true
    volume_enabled: true

  pattern_ingester:
    enabled: true

# Loki's built-in MinIO (avoids external MinIO config headaches)
minio:
  enabled: true

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

chunksCache:
  enabled: false
resultsCache:
  enabled: false
