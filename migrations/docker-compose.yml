services:
  postgres:
    image: postgres:16
    container_name: migrations-demo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./generated/certs:/certs:ro
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    command:
      - bash
      - -ceu
      - |
        mkdir -p /var/lib/postgresql/tls
        cp /certs/postgres.crt /var/lib/postgresql/tls/server.crt
        cp /certs/postgres.key /var/lib/postgresql/tls/server.key
        cp /certs/ca.crt /var/lib/postgresql/tls/root.crt
        chown -R postgres:postgres /var/lib/postgresql/tls
        chmod 0600 /var/lib/postgresql/tls/server.key
        exec docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file=/var/lib/postgresql/tls/server.crt \
          -c ssl_key_file=/var/lib/postgresql/tls/server.key \
          -c ssl_ca_file=/var/lib/postgresql/tls/root.crt \
          -c password_encryption=scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  postgres-data:
