apiVersion: apps/v1
kind: Deployment
metadata:
  name: migrations-demo-api
  namespace: migrations-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: migrations-demo-api
  template:
    metadata:
      labels:
        app: migrations-demo-api
        role: app
    spec:
      serviceAccountName: app
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: migrations-demo-api:demo
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-db-credentials
                  key: database_url
          volumeMounts:
            - name: postgres-ca
              mountPath: /var/run/postgres-ca
              readOnly: true
            - name: postgres-client
              mountPath: /var/run/postgres-client
              readOnly: true
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /db-healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
      volumes:
        - name: postgres-ca
          secret:
            secretName: postgres-ca
            defaultMode: 0444
        - name: postgres-client
          secret:
            secretName: app-db-credentials
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
            defaultMode: 0440
        - name: tmp
          emptyDir: {}
