services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak-oidc-demo-keycloak
    command: ["start-dev", "--http-port=8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      # Pin the issuer URL so tokens always say
      # iss=http://localhost:8180/realms/poc, regardless of whether the
      # caller is the user's browser (hits localhost:8180) or the BFF
      # in Kubernetes (hits external-keycloak:8180 via ExternalName).
      # Without this, the issuer would vary by Host header and the BFF
      # could not validate browser-issued tokens.
      KC_HOSTNAME: http://localhost:8180
      KC_HOSTNAME_STRICT: "false"
    ports:
      # Host port 8180 leaves 8080 free for the BFF's k8s port-forward.
      - "8180:8080"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          exec 3<>/dev/tcp/127.0.0.1/9000;
          printf 'GET /health/ready HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3;
          grep -q '"status": "UP"' <&3
      interval: 5s
      timeout: 5s
      retries: 40

  postgres:
    image: postgres:18
    container_name: keycloak-oidc-demo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pocdb
      POSTGRES_USER: pgadmin
      POSTGRES_PASSWORD: pgadminpass
    volumes:
      - pg_data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgadmin -d pocdb"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pg_data:
